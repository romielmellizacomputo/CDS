name: Deploy to GitHub Pages
on:
  push:
    branches:
      - main
  workflow_dispatch:
  repository_dispatch:
    types: [deploy-pages]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Private Source (centralized-docs-system)
        uses: actions/checkout@v4
        with:
          repository: romielmellizacomputo/centralized-docs-system
          token: ${{ secrets.PAT_TOKEN }}
          path: source

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          cd source
          npm install --legacy-peer-deps

      - name: Build React app (skip react-snap)
        run: |
          cd source
          npm run build --ignore-scripts
        env:
          CI: false
          DISABLE_ESLINT_PLUGIN: true
          SKIP_PREFLIGHT_CHECK: true

      - name: Checkout cds-engine
        uses: actions/checkout@v4
        with:
          path: target
          token: ${{ secrets.PAT_TOKEN }}

      - name: Copy build output to cds-engine
        run: |
          cd target
          find . -maxdepth 1 ! -name '.github' ! -name '.' ! -name '.git' -exec rm -rf {} +
          cp -r ../source/build/. .

      - name: Commit and push to cds-engine
        run: |
          cd target
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .
          git commit -m "Deploy latest build from centralized-docs-system" || echo "No changes to commit"
          git push
